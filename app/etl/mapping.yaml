# PARTIE SEMANTIQUE
# C'est le champ brute qui va servir à contextualiser les evenements. FAISS embbed ce champ,
# il vaut mieux donc limiter au strict contexte surtout qu'il est mauvais pour "donner du sens"
# aux chiffres (2ans ou 20ans c'est contextuellement/dimensionnellement identique).
# ex a quoi ca va ressembler pour le LLM:
# "Titre: Atelier Peinture | Ville: Paris | Age_min: 2 | Téléphone: 0102030405 | Prix: Gratuit..."
# EN SOMME CETTE PARTIE CONCERNE LES INFORMATIONS QUE LE LLM VA LIRE ET RECUP' LES INFOS.
event_fields:
  # Informations principales
  - label: "Titre"
    api_key: "title_fr"
    default: ""
  - label: "Détails"
    api_key: "longdescription_fr"
    default: ""
  # Localisation
  - label: "Adresse"
    api_key: "location_address"
    default: ""
  - label: "Ville"
    api_key: "location_city"
    default: ""
  # Contact
  - label: "Téléphone"
    api_key: "location_phone"
    default: ""
  - label: "Web"
    api_key: "location_website"
    default: ""
  # Autres
  - label: "Acces"
    api_key: "location_access_fr"
    default: ""
  - label: "Handicap"
    api_key: "accessibility_label_fr"
    default: "accessibilité réduite"
  - label: "Prix"
    api_key: "condition_fr"
    default: ""

# PARTIE LOGIQUE
# On y stocke les métadonnées qui vont servir de filtre logique.
# C'EST LA PARTIE QUI VA CONTROLER LA PERTINENCE DES SOURCES A FOURNIR AU LLM. ATTENTION, SI
# L'INFO N'EST PRESENTE QU'ICI, LE LLM N'Y AURA PAS ACCES!

metadata_fields:
  uid: "uid"
  url: "canonicalurl"
  titre: "title_fr"
  description: "description_fr"
  keywords: "keywords_fr"
  # Lieu
  city: "location_city"
  address: "location_address"
  venue: "location_name"
  access: "location_access_fr"
  # Conditions
  age_min: "age_min"
  age_max: "age_max"
  handicap: "accessibility_label_fr"
  price: "condition_fr"
  # Periode
  date_start: "firstdate_begin"
  date_end: "lastdate_end"
  # Contact
  phone: "location_phone"
  web: "location_website"
