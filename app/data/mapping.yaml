# PARTIE SEMANTIQUE
# C'est le champ brute qui va servir à contextualiser les evenements. FAISS embbed ce champ,
# il vaut mieux donc limiter au strict contexte surtout qu'il est mauvais pour "donner du sens"
# aux chiffres (2ans ou 20ans c'est contextuellement/dimensionnellement identique).
# ex a quoi ca va ressembler pour le LLM:
# "Titre: Atelier Peinture | Ville: Paris | Age_min: 2 | Téléphone: 0102030405 | Prix: Gratuit..."
event_fields:
  # Informations principales
  - label: "Titre"
    api_key: "title_fr"
    default: "Sans titre"
  - label: "Description"
    api_key: "description_fr"
    default: ""
  - label: "Détails"
    api_key: "longdescription_fr"
    default: ""
  # Localisation
  - label: "Lieu"
    api_key: "location_name"
    default: ""
  - label: "Ville"
    api_key: "location_city"
    default: ""
  - label: "Accessibilité"
    api_key: "location_access_fr"
    defaut: ""

# PARTIE LOGIQUE
# On y stocke les métadonnées qui vont servir de filtre logique. En gros si la donnée peut
# peut être vu comme des conditions claires, on l'a met ici.
metadata_fields:
  uid: "uid"
  url: "canonicalurl"
  titre: "title_fr"
  # Lieu
  city: "location_city"
  address: "location_address"
  access: "location_access_fr"
  # Conditions
  age_min: "age_min"
  age_max: "age_max"
  handicap: "accessibility_label_fr"
  price: "condition_fr"
  # Periode
  date_start: "firstdate_begin"
  date_end: "lastdate_end"
  # Contact
  phone: "location_phone"
  web: "location_website"
